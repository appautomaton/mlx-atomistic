name: Publish Python package

on:
  release:
    types:
      - published

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: macos-15
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.13.12

      - name: Verify release tag matches package version
        run: uv run --no-project --python 3.13.12 python -c "import os, sys, tomllib; version = tomllib.load(open('pyproject.toml', 'rb'))['project']['version']; tag = os.environ['GITHUB_REF_NAME']; sys.exit(0 if tag == f'v{version}' else f'release tag {tag!r} must equal v{version}')"

      - name: Install test tooling
        run: uv sync --locked --no-default-groups --extra prep --group test

      - name: Lint
        run: uv run --locked --no-default-groups --group test ruff check src tests scripts

      - name: Hosted package boundary tests
        run: uv run --locked --no-default-groups --group test python -m pytest tests/test_runtime_boundaries.py

      - name: Generate API documentation
        run: uv run --no-project --with griffe --python 3.13.12 python scripts/gen_api_docs.py

      - name: Build package distributions
        run: uv build

      - name: Check package distributions
        run: uv run --no-project --with twine twine check dist/*

      - name: Check package distribution contents
        run: uv run --no-project --python 3.13.12 python scripts/check_dist_contents.py dist/*

      - name: Isolated wheel import smoke
        run: uv run --no-project --isolated --with dist/mlx_atomistic-*-py3-none-any.whl python -c "import mlx_atomistic as ma; print(ma.__version__)"

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
