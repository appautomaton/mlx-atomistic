name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint:
    # GitHub-hosted macOS runners have no usable Metal GPU, so the MLX test suite
    # SIGABRTs there ("Fatal Python error: Aborted", a different test each run) no
    # matter the parallelism. CI therefore only LINTS on push/PR; the full MLX test
    # suite runs locally / on a self-hosted Apple-silicon runner (see README/CI notes).
    name: lint
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install lint tooling
        run: uv sync --extra prep --group test

      - name: Lint
        run: uv run --group test ruff check src tests scripts

  full:
    # Comprehensive nightly/manual run: builds LAMMPS, runs every tier, gates coverage.
    name: full suite + coverage
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install full dev environment (builds LAMMPS)
        run: uv sync --extra prep --group dev

      - name: Full suite + coverage gate
        run: uv run --group dev python -m pytest --cov=mlx_atomistic --cov-report=term-missing --cov-fail-under=80
