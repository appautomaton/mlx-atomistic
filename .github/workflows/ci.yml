name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 7 * * *" # nightly full suite + coverage gate
  workflow_dispatch:

jobs:
  fast:
    # Quick feedback on every push/PR: parallel unit lane, no reference engines,
    # so it never builds LAMMPS. Excludes the slow / reference / data tiers.
    name: fast lane (unit, parallel)
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install test tooling (no reference engines)
        run: uv sync --extra prep --group test

      - name: Lint
        run: uv run --group test ruff check src tests scripts

      - name: Fast tests (parallel; exclude slow/reference/data)
        run: uv run --group test python -m pytest -n auto -m "not slow and not reference and not data"

  full:
    # Comprehensive nightly/manual run: builds LAMMPS, runs every tier, gates coverage.
    name: full suite + coverage
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install full dev environment (builds LAMMPS)
        run: uv sync --extra prep --group dev

      - name: Full suite + coverage gate
        run: uv run --group dev python -m pytest --cov=mlx_atomistic --cov-report=term-missing --cov-fail-under=80
