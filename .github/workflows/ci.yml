name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  fast:
    name: fast package lane
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install test tooling
        run: uv sync --locked --no-default-groups --extra prep --group test

      - name: Lint
        run: uv run --locked --no-default-groups --group test ruff check src tests scripts

      - name: Fast package tests
        run: uv run --locked --no-default-groups --group test python -m pytest -n auto -m "not slow and not integration and not reference and not data and not gpu"

  full:
    # Comprehensive scheduled/manual run. Data/reference tests are still opt-in
    # because their fixtures and engines are local validation surfaces.
    name: package suite + coverage
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install package test environment
        run: uv sync --locked --no-default-groups --extra prep --group test

      - name: Package suite + coverage gate
        run: uv run --locked --no-default-groups --group test python -m pytest -m "not reference and not data and not gpu" --cov=mlx_atomistic --cov-report=term-missing --cov-fail-under=80
